---
name: "Codestyle checks"

on:
  push:
    paths:
      - 'service/**'
      - 'frontend/**'
      - 'proto/**'
      - '.github/workflows/codestyle.yml'


jobs:
  codestyle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'service/go.mod'
          cache-dependency-path: service/go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: go tools and protobuf codegen
        run: make -C service -w go-tools && make -w protoc

      - name: service codestyle
        run: make -C service -w codestyle

      - name: frontend lint
        run: (cd frontend && npm ci) && make -C frontend -w lint
